# Flat (autonomous) variant — runs straight through without approval gates.
# Compare with produce-deliverables-interactive.yaml for the staged version
# with human review gates before TTS synthesis and after site build.
# This is the version called by full-edition.yaml.

name: produce-deliverables
description: >
  Phase 4: Generate all three deliverables from completed sections and assets.
  Produces voiceover scripts, synthesizes MP3 audio, then builds the HTML reading
  site (with audio player wired to the MP3s), the HTML presentation deck, and
  verifies all outputs. Site is built AFTER audio so it can discover which MP3
  files exist and wire the audio player accordingly.

context:
  sections_dir: ".design/sections"   # Input: section markdown files
  assets_dir: "public/diagrams"      # Input: generated SVG assets
  output_dir: "."                    # Where to write deliverables
  subject_name: ""                   # For HTML title and meta tags
  produce_audio: true                # Whether to produce narration scripts + MP3s
  tts_model: "tts-1-hd"             # OpenAI TTS model
  tts_voices: '["fable", "nova", "alloy"]'   # TTS voices to synthesize
  tts_speed: 0.95                    # Slightly slower for comprehension

steps:
  - id: build-narration
    type: conditional
    condition: "{{produce_audio}}"
    step:
      id: write-scripts
      type: foreach
      items: "{{sections_dir}}"
      step:
        id: write-script
        type: agent
        agent: education:narration-adapter
        prompt: >
          Write the voiceover script for: {{item.chapter_title}}

          Read the section content at {{sections_dir}}/{{item.section_filename}}.
          Follow the voice guidelines in .design/CONTENT-STRATEGY.md.
          Read @education:context/deliverable-specs.md Deliverable 3 specification.

          Produce: audio/{{item.asset_ref}}.txt

          The script must:
          - Be adapted for listening (not a verbatim reading)
          - Replace visual references with verbal descriptions
          - Use natural paragraph breaks for pacing (no [pause] markers)
          - Be clean prose with no production markers of any kind
          - Be approximately {{item.target_minutes}} minutes when spoken at normal pace

  - id: synthesize-audio
    type: conditional
    condition: "{{produce_audio}}"
    step:
      id: run-tts
      type: recipe
      recipe: education:recipes/synthesize-audio.yaml
      context:
        audio_dir: "audio"
        tts_model: "{{tts_model}}"
        tts_voices: "{{tts_voices}}"
        tts_speed: "{{tts_speed}}"

  - id: build-site
    type: agent
    agent: education:section-author
    prompt: >
      Build the complete HTML reading site from the section content.

      Read all sections in {{sections_dir}} in chapter order.
      Read .design/DESIGN-SYSTEM.md for visual tokens and component patterns.
      Read @education:context/deliverable-specs.md for the full site specification.

      Inline all SVG diagrams from {{assets_dir}} using asset_ref mapping from frontmatter.

      Produce: {{output_dir}}/site.html

      The site must include:
      - Fixed nav bar with TOC toggle and audio player controls
      - Sticky sidebar TOC with scroll-tracking active state
      - All chapter sections with proper block rendering
      - Inline SVG diagrams for all 'ready' diagram blocks
      - Stub placeholders for 'stub' blocks (audio, vignette, chat)
      - Presentation mode (CSS + JS — floating "Present" button, arrow-key navigation, speaker notes)
      - IntersectionObserver scroll-reveal for content blocks
      - D3 dotgraph viewer for any blocks with variant: interactive

      **Audio player (required if MP3 files exist in audio/):**
      Check the audio/ directory for .mp3 files. If MP3 files are present, build the
      chapter audio player into the site per the Audio Player Contract in
      @education:context/deliverable-specs.md:

      1. Build AUDIO_FILES (primary/default voice) and VOICE_AUDIO_FILES (per-voice)
         maps from the actual files present. Example:
           const AUDIO_FILES = {
             "ch01-introduction": "audio/ch01-introduction.mp3",
             ...
           };
           const VOICE_AUDIO_FILES = {
             fable: { "ch01-introduction": "audio/fable/ch01-introduction.mp3", ... },
             nova:  { "ch01-introduction": "audio/nova/ch01-introduction.mp3", ... },
             alloy: { "ch01-introduction": "audio/alloy/ch01-introduction.mp3", ... }
           };
           let activeVoice = 'fable';

      2. Voice selector — pills or menu in sidebar audio controls. Show only voices
         that have files. Switching voice preserves currentTime and playback state.

      3. Speed selector — cycle button (0.75×, 1×, 1.25×, 1.5×, 2×). Persists
         across chapter changes via playbackRate on the audio element.

      4. Transport controls — back 15s, forward 15s, scrubber bar (3px track,
         accent fill, draggable thumb, mm:ss display).

      5. Audio discoverability — prominent "Listen to this chapter" affordance
         under each chapter title.

      6. Nav bar play/pause pill, per-chapter TOC buttons, scroll-to-audio sync,
         auto-advance, P keyboard shortcut, single shared <audio> element.

      7. Dynamic voice detection — populate voice selector from voices that have
         files, hide selector if only 1 voice.

      If no MP3 files exist in audio/, omit the audio player entirely (the nav bar
      should not show audio controls). The site must work correctly with or without
      audio files present.

  - id: build-deck
    type: agent
    agent: education:deck-composer
    prompt: >
      Build the standalone HTML presentation deck from the section content.

      Read all sections in {{sections_dir}} in chapter order.
      Pay special attention to each section's "Presentation Slides" and "Speaker Notes" blocks.
      Read @education:context/deliverable-specs.md Deliverable 2 specification.

      Produce: {{output_dir}}/deck.html

      The deck must include:
      - Arrow-key and touch-swipe navigation
      - Slide counter (current/total) in corner
      - Speaker notes panel (N key to toggle, hidden from projected view)
      - Slide overview mode (Escape key — grid of all slide thumbnails)
      - Full presentation keyboard controls (F for fullscreen, G+number for go-to)
      - Same design tokens as site.html (per DESIGN-SYSTEM.md variant)

  - id: verify-deliverables
    type: agent
    agent: foundation:explorer
    prompt: >
      Verify all deliverables were produced:

      Check that these files exist:
      - {{output_dir}}/site.html
      - {{output_dir}}/deck.html
      - audio/*.txt (one per chapter, if produce_audio was true)
      - audio/*.mp3 (one per chapter, if produce_audio was true)

      Check that site.html:
      - Opens and renders (check for major HTML errors)
      - Has the correct number of chapter sections
      - Has presentation mode controls
      - If MP3 files exist: has the AUDIO_FILES map, nav bar audio pill,
        per-chapter TOC play buttons, and the shared <audio> element

      Check that each .txt script has a corresponding .mp3 file.

      Report any missing deliverables or obvious issues.
      If everything looks correct, confirm production is complete.
