# Full Parallax 3-pass discovery — the deep/opt-in mode.
# Compare with discover-quick.yaml for the single-pass default.
#
# Use this for large, complex, or poorly-documented repos where the extra
# token cost (~3-5× repo volume) is justified by cross-validated accuracy.
# Set discovery_depth: "deep" in full-edition.yaml context to use this.

name: discover-deep
version: "1.0.0"
description: >
  Phase 1 (Deep): Full Parallax Discovery with 3 independent passes.
  Runs multi-agent, multi-pass analysis to build a verified knowledge base
  for teaching. More thorough than quick discovery but significantly more
  token-heavy. Use for complex repos where single-pass might miss things.
  Output feeds shape-content phase as source material for curriculum design.

context:
  source_repo: ""        # Required: path to source repository
  subject_name: ""       # Required: subject name for the reconciliation document
  output_path: ".design/reconciliation.md"  # Where to write the reconciliation

steps:
  - id: load-parallax-skill
    type: agent
    agent: foundation:explorer
    prompt: >
      Load the parallax-investigation skill and prepare a discovery plan for the following source:

      Subject: {{subject_name}}
      Source repo: {{source_repo}}

      **Purpose: We are building an education product.** The goal of this discovery
      is to deeply understand the system so we can teach it to someone else. We are
      NOT auditing the repo for issues. We are learning how it works so we can
      explain it clearly.

      Produce a discovery plan that:
      1. Lists the key files and directories to study
      2. Identifies the 3 learning perspectives:
         - Code tracing: how the system actually executes (call paths, data flow)
         - Behavior observation: what the system does from a user's perspective
         - Integration mapping: how components connect and why they are composed this way
      3. Outlines the knowledge categories to build:
         - Core concepts (what does this system do?)
         - Architecture (how is it structured and why?)
         - Key mechanisms (how do the important parts work?)
         - Design decisions (what trade-offs were made and why?)
         - Usage patterns (how is it meant to be used?)
      4. Lists the concepts a student would need to understand, in learning order

      Write the plan to .design/discovery-plan.md

  - id: run-discovery
    type: agent
    agent: foundation:explorer
    prompt: >
      Execute Parallax Discovery on the source material.
      Follow the discovery plan in .design/discovery-plan.md.

      Subject: {{subject_name}}
      Source repo: {{source_repo}}

      **Intent: Build deep understanding for teaching, not auditing.**

      Run three independent understanding passes:
      1. Code tracing pass: follow execution paths, read source files, understand
         how the system works at the code level. Map the key data flows and call chains.
      2. Behavior observation pass: understand what the system does from a user's
         perspective. What are the inputs, outputs, and observable behaviors?
      3. Integration mapping pass: understand how components connect, what the
         contracts between them are, and why the system is composed this way.

      For each finding, record:
      - The knowledge claim (what we now understand to be true about the system)
      - Evidence (file:line citations from the source that support this understanding)
      - Confidence (confirmed / likely / uncertain)
      - Which perspectives confirmed it

      Focus on UNDERSTANDING, not on finding problems. The question is "how does
      this work and why?" not "what is wrong with this?"

  - id: reconcile
    type: agent
    agent: foundation:explorer
    prompt: >
      Synthesize the three discovery passes into a knowledge base for education.

      Subject: {{subject_name}}

      **This document will be used by a content strategist to design a curriculum.
      Write it as a knowledge base, not as an audit report.**

      Produce {{output_path}} with:

      1. **System Overview** — What is {{subject_name}}? What problem does it solve?
         What is its core design philosophy? Write this as a clear explanation,
         not as findings from an investigation.

      2. **Verified Knowledge (VC-XX format)** — Each item is something we now
         understand to be true about the system. Each with:
         - The knowledge claim (stated as a fact about how the system works)
         - File:line evidence (supporting citations)
         - Confidence level
         - Which perspectives confirmed it
         Frame these as "The system does X because Y" not "We found that X."

      3. **Core Concepts** — The key ideas a student must understand, in suggested
         teaching order. What depends on what? What must be explained before
         what else makes sense?

      4. **Design Decisions (XC-XX)** — The architectural choices and trade-offs
         that make this system what it is. Why was it designed this way instead
         of another way? These are the "aha moments" in a class.

      5. **Diagram Content Guide** — Which concepts need visual explanation?
         What would a diagram show? What relationships or flows are hard to
         explain without a picture?

      **Do NOT include:**
      - A "Discrepancies" section cataloging inconsistencies between docs and code
      - A "Gaps" or "Unknowns" section listing things that are missing or broken
      - Audit language ("we found", "the investigation revealed", "static analysis shows")
      - Numbered discrepancy IDs (D-XX) or unknown IDs (UNK-XX)

      If something genuinely cannot be determined, note it as a confidence: uncertain
      on the relevant VC-XX claim, not as a separate unknowns section.

      This document is the source of truth for the content-strategist. Every section's
      source_claims will reference VC-XX IDs from this document.
