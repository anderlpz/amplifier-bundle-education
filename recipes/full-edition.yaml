name: full-edition
description: >
  Produce a complete multi-modal education edition from source content.
  Runs the full pipeline: Parallax Discovery → content shaping → visual assets (with approval gate) → deliverable production.
  Requires source_repo and subject_name. Produces site.html, deck.html, and audio/*.txt.

context:
  source_repo: ""           # Required: path to source repository or document
  subject_name: ""          # Required: e.g. "The Amplifier Framework"
  edition: "1.0"            # Edition number for manifest
  output_dir: "."           # Where to write deliverables (default: current directory)
  aesthetic_ref: ""         # Optional: art direction reference URL or description
  audience: ""              # Optional: audience description for content-strategist

steps:
  - id: discover
    type: recipe
    recipe: education:recipes/discover.yaml
    context:
      source_repo: "{{source_repo}}"
      subject_name: "{{subject_name}}"

  - id: shape-content
    type: recipe
    recipe: education:recipes/shape-content.yaml
    context:
      subject_name: "{{subject_name}}"
      audience: "{{audience}}"
      reconciliation: "{{discover.reconciliation_path}}"

  - id: generate-assets
    type: recipe
    recipe: education:recipes/generate-assets.yaml
    context:
      sections_dir: "{{shape-content.sections_dir}}"
      aesthetic_ref: "{{aesthetic_ref}}"

  - id: produce-deliverables
    type: recipe
    recipe: education:recipes/produce-deliverables.yaml
    context:
      sections_dir: "{{shape-content.sections_dir}}"
      assets_dir: "public/diagrams"
      output_dir: "{{output_dir}}"
      subject_name: "{{subject_name}}"

  - id: record-edition
    type: agent
    agent: education:edition-manager
    prompt: >
      Record this as Edition {{edition}} of the {{subject_name}} education product.
      Write .edition/manifest.json, .edition/source-hashes.json,
      .edition/section-hashes.json, and .edition/asset-hashes.json.
      Source repo: {{source_repo}}
      Sections: {{shape-content.sections_dir}}
      Assets: public/diagrams/
      Deliverables: site.html, deck.html, audio/
